<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Colouring Mode · Galway Geometry</title><style>:root{color-scheme:light;--paper:#f6f7f4;--ink:#111;--muted:#666;--line:#d8d8d0;--accent:#0c4f65}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--paper);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden}.app{height:100vh;display:grid;grid-template-columns:320px 1fr}.panel{border-right:1px solid var(--line);background:#fff;padding:18px;display:flex;flex-direction:column;gap:14px;z-index:2}.brand h1{margin:0;font-size:25px;line-height:.95;letter-spacing:-.06em;text-transform:uppercase}.brand p{margin:10px 0 0;color:var(--muted);font-size:12px;line-height:1.55}.controls{display:grid;grid-template-columns:1fr 1fr;gap:9px}button,select,input,a.button{font:inherit;border:1px solid var(--line);background:#fff;color:#111;border-radius:14px;padding:10px 11px;text-decoration:none;text-align:center}button.primary,a.primary{background:var(--accent);border-color:var(--accent);color:#fff}.meta{margin-top:auto;border-top:1px dashed var(--line);padding-top:14px;color:var(--muted);font-size:12px;line-height:1.55}.stage-wrap{height:100vh;display:grid;place-items:center;padding:22px;background:linear-gradient(145deg,#eceee8,#ffffff)}#stage{height:calc(100vh - 44px);width:auto;max-width:100%;background:#fff;box-shadow:0 20px 70px rgba(0,0,0,.12);border:1px solid #ddd}.tiny{font-size:11px;color:var(--muted);line-height:1.45}.mode-links{display:flex;flex-wrap:wrap;gap:8px}.mode-links a{font-size:11px;color:#0c4f65}@media(max-width:860px){html,body{overflow:auto}.app{height:auto;min-height:100vh;grid-template-columns:1fr}.panel{border-right:0;border-bottom:1px solid var(--line)}.stage-wrap{height:auto;min-height:70vh}#stage{width:100%;height:auto}}</style></head><body><div class="app"><aside class="panel"><div class="brand"><h1>Colouring Mode</h1><p>A preset lawful colouring sheet appears immediately. Use Next or Random to move through authored recipes and deterministic seed variants.</p></div><div><label class="tiny" for="family">Family</label><select id="family"></select></div><div><label class="tiny" for="recipe">Recipe</label><select id="recipe"></select></div><div><label class="tiny" for="seed">Seed</label><input id="seed" type="number"></div><div class="controls"><button class="primary" id="next">Next</button><button id="random">Random</button><button id="apply">Apply Seed</button><button id="download">Download SVG</button><button id="print">Print</button><a class="button" href="../../index.html">Modes</a></div><div class="mode-links"><a href="../../modes/constructions/">Constructions</a><a href="../../modes/stills/">Stills</a><a href="../../site/">Ordinary website</a><a href="../../construction/colouring-generator/">Generator controls</a></div><div class="meta"><strong id="title">Loading</strong><p id="desc"></p><p id="count"></p></div></aside><main class="stage-wrap"><svg id="stage" viewBox="0 0 794 1123" role="img" aria-label="Full screen lawful colouring sheet"></svg></main></div><script src="../../construction/recipes[1].js"></script><script src="../../construction/renderer[1].js"></script><script>(function(){var REC=window.GGColouringRecipes,REN=window.GGColouringRenderer,stage=document.getElementById('stage'),family=document.getElementById('family'),recipe=document.getElementById('recipe'),seed=document.getElementById('seed'),title=document.getElementById('title'),desc=document.getElementById('desc'),count=document.getElementById('count');var designs=REC.buildDesignCatalog(8),filtered=designs.slice(),index=0;function fill(){family.innerHTML='<option value="all">All families</option>'+REC.families.map(function(f){return '<option>'+f+'</option>';}).join('');recipe.innerHTML='<option value="all">Any recipe</option>'+REC.RECIPES.map(function(r){return '<option value="'+r.id+'">'+r.id+' · '+r.title+'</option>';}).join('');}function applyFilters(){var f=family.value||'all',r=recipe.value||'all';filtered=designs.filter(function(d){return (f==='all'||d.family===f)&&(r==='all'||d.recipeId===r);});if(!filtered.length)filtered=designs.slice();index=0;render();}function render(){var d=filtered[index%filtered.length];seed.value=d.seed;REN.renderTemplate(stage,d,{width:794,height:1123,includeCaption:false,mode:'print'});title.textContent=d.designId+' · '+d.recipe.title;desc.textContent=d.recipe.description;count.textContent=(index+1)+' of '+filtered.length+' in current filter';}function current(){var d=filtered[index%filtered.length];var s=parseInt(seed.value,10);if(!isNaN(s)){d=Object.assign({},d,{seed:s});}return d;}document.getElementById('next').onclick=function(){index=(index+1)%filtered.length;render();};document.getElementById('random').onclick=function(){index=Math.floor(Math.random()*filtered.length);render();};document.getElementById('apply').onclick=function(){REN.renderTemplate(stage,current(),{width:794,height:1123,includeCaption:false,mode:'print'});};document.getElementById('download').onclick=function(){REN.downloadSVG(current(),{width:794,height:1123,includeCaption:true,mode:'print'});};document.getElementById('print').onclick=function(){REN.printSVG(current(),{width:794,height:1123,includeCaption:false,mode:'print'});};family.onchange=applyFilters;recipe.onchange=applyFilters;fill();render();})();</script></body></html>
